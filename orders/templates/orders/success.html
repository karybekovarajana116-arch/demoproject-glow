{% extends 'base.html' %}


{% block title %}
Спасибо | GlowStore
{% endblock %}


{% block content %}


<style>

.success-box{

    max-width:600px;

    margin:80px auto;

    background:white;

    padding:50px;

    border-radius:25px;

    text-align:center;

    box-shadow:0 15px 35px rgba(0,0,0,.08);

}


.success-box h1{

    font-family:'Playfair Display', serif;

    font-size:42px;

    color:#333;

}


.success-box p{

    color:#777;

    font-size:18px;

}


.success-button{

    display:inline-block;

    margin-top:25px;

    background:#333;

    color:white;

    padding:14px 35px;

    border-radius:30px;

    text-decoration:none;

    transition:.3s;

}


.success-button:hover{

    background:#8b6f5a;

}


</style>



<div class="success-box">

    <h1>
        Спасибо за заказ ✨
    </h1>


    <p>
        Ваш заказ успешно оформлен.
        Мы начинаем его обработку.
    </p>


    <a class="success-button" href="/">
        Вернуться в магазин
    </a>


</div>


{% endblock %}
