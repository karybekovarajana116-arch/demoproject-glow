{% extends 'base.html' %}

{% block title %}
Оформление заказа | GlowStore
{% endblock %}

{% block content %}

<style>

.checkout-container{
    max-width:1100px;
    margin:50px auto;
}

.checkout-card{
    display:flex;
    gap:40px;
    background:#fff;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    overflow:hidden;
}

.checkout-form{
    flex:2;
    padding:45px;
}

.checkout-form h1{
    margin-top:0;
    font-family:'Playfair Display', serif;
    color:#333;
    font-size:38px;
}

.checkout-form p{
    color:#777;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:22px;
}

.form-group input{
    width:100%;
    padding:15px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:16px;
    font-family:'Poppins', sans-serif;
    box-sizing:border-box;
    transition:.3s;
}

.form-group input:focus{
    outline:none;
    border-color:#8b6f5a;
    box-shadow:0 0 10px rgba(139,111,90,.15);
}

.checkout-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#8b6f5a;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

.checkout-btn:hover{
    background:#6f5848;
}

.checkout-info{
    flex:1;
    background:#faf8f5;
    padding:45px;
}

.checkout-info h2{
    margin-top:0;
    color:#333;
}

.info{
    margin-top:25px;
}

.info p{
    margin:15px 0;
    color:#555;
}

@media(max-width:900px){

.checkout-card{
    flex-direction:column;
}

}

</style>

<div class="checkout-container">

    <div class="checkout-card">

        <div class="checkout-form">

            <h1>✨ Оформление заказа</h1>

            <p>Заполните данные для доставки.</p>

            <form method="POST">

                {% csrf_token %}

                <div class="form-group">
                    <input
                        type="text"
                        name="name"
                        placeholder="Ваше имя"
                        required>
                </div>

                <div class="form-group">
                    <input
                        type="email"
                        name="email"
                        placeholder="Email"
                        required>
                </div>

                <div class="form-group">
                    <input
                        type="text"
                        name="address"
                        placeholder="Адрес доставки"
                        required>
                </div>

                <button type="submit" class="checkout-btn">
                    Подтвердить заказ
                </button>

            </form>

        </div>

        <div class="checkout-info">

            <h2>Ваш заказ</h2>

            <div class="info">
                <p>🚚 Доставка по Кыргызстану</p>
                <p>⭐ Только оригинальная продукция</p>
            </div>

        </div>

    </div>

</div>

{% endblock %}
