{% extends 'base.html' %}


{% block title %}
Вход | GlowStore
{% endblock %}


{% block content %}


<style>

    .auth-box {

        max-width: 450px;

        margin: 60px auto;

        background: white;

        padding: 40px;

        border-radius: 25px;

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);

    }


    .auth-box h1 {

        text-align: center;

        font-family: 'Playfair Display', serif;

    }


    input {

        width: 100%;

        padding: 12px;

        border: 1px solid #ddd;

        border-radius: 12px;

        margin: 10px 0;

    }


    button {

        width: 100%;

        background: #333;

        color: white;

        padding: 14px;

        border: none;

        border-radius: 30px;

        cursor: pointer;

    }


    button:hover {

        background: #8b6f5a;

    }


    .link {

        text-align: center;

        margin-top: 20px;

    }


</style>


<div class="auth-box">


    <h1>
        Вход
    </h1>


    <form method="POST">


        {% csrf_token %}


        <input
                type="text"
                name="username"
                placeholder="Имя пользователя"
        >


        <input
                type="password"
                name="password"
                placeholder="Пароль"
        >


        <button>
            Войти
        </button>


    </form>


    <div class="link">

        Нет аккаунта?

        <a href="{% url 'register' %}">
            Создать
        </a>


    </div>


</div>


{% endblock %}
